name: Network Monitor CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Runs automatically every 6 hours (cron syntax: min hour day month weekday)
    - cron: '0 */6 * * *'
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  test-and-validate:
    name: Run tests and network validation
    runs-on: ubuntu-latest     # Linux environment (Ubuntu)

    steps:
      # ── Step 1: Check out the code ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Set up Python ──────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Step 3: Install dependencies ───────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 4: Run unit tests (validation framework) ──────────────────────
      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short --junitxml=test-results.xml

      # ── Step 5: Upload test results as artifact ────────────────────────────
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()    # upload even if tests fail
        with:
          name: test-results
          path: test-results.xml

      # ── Step 6: Run live network measurements + validation ─────────────────
      - name: Run network monitor
        run: |
          python main.py

      # ── Step 7: Upload measurement reports ────────────────────────────────
      - name: Upload network reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: network-reports
          path: reports/
